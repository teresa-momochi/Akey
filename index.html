<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>教材編輯</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: sans-serif; padding:20px; }
.grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
input { width:100%; }
</style>

</head>
<body>

<h2>教材編輯</h2>

<button onclick="addRoom()">➕ 新增教室</button>
<button onclick="generateGame()">💾 儲存並開始</button>

<br><br>

<div id="setup-grid" class="grid"></div>

<script>
// ===== Supabase =====
const SUPABASE_URL = "https://yrmgvwwmsgbkhijaosyw.supabase.co";
const SUPABASE_KEY = "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentRoom = "room1";
let gameData = [];

// ===== 初始化 =====
window.onload = () => {
    gameData = Array.from({length:12}, () => ({word:"",image:""}));
    renderSetupGrid();
};

// ===== 畫輸入框 =====
function renderSetupGrid(){
    const grid = document.getElementById('setup-grid');
    grid.innerHTML = "";

    gameData.forEach((item,i)=>{
        grid.innerHTML += `
        <div>
            <input id="w-${i}" placeholder="單字">
            <input type="file" onchange="handleFile(event,${i})">
            <img id="p-${i}" width="50">
        </div>`;
    });
}

// ===== 上傳圖片 =====
async function handleFile(e,index){
    const file = e.target.files[0];
    if(!file) return;

    const path = `test/${Date.now()}_${file.name}`;
    await supabase.storage.from('images').upload(path,file);

    const { data } = supabase.storage.from('images').getPublicUrl(path);

    gameData[index].image = data.publicUrl;
    document.getElementById(`p-${index}`).src = data.publicUrl;
}

// ===== 儲存 =====
async function generateGame(){
    const finalContent = [];

    for(let i=0;i<12;i++){
        finalContent.push({
            word: document.getElementById(`w-${i}`).value,
            image: document.getElementById(`p-${i}`).src
        });
    }

    const { error } = await supabase.from('rooms').insert({
        user_id: "test-user",
        room: currentRoom,
        content: finalContent
    });

    if(error){
        alert("錯誤："+error.message);
    }else{
        alert("已儲存！");
    }
}

// ===== 新增教室 =====
function addRoom(){
    const name = prompt("輸入教室名稱（例如：room2）");
    if(name){
        currentRoom = name;
        alert("切換到："+name);
    }
}
</script>

</body>
</html>
