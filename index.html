<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>教材編輯</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>教材編輯</h2>

<button onclick="addRoom()">新增教室</button>
<button onclick="generateGame()">儲存並開始</button>

<div id="setup-grid"></div>

<script>

// ===== Supabase（只留這一份！！）=====
const client = window.supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E"
);

let gameData = [];
const currentRoom = "room1";

// ===== 初始化 =====
window.onload = function () {
  gameData = Array.from({length:12}, () => ({word:"",image:""}));
  renderSetupGrid();
};

// ===== 畫畫面 =====
function renderSetupGrid(){
  const grid = document.getElementById("setup-grid");
  grid.innerHTML = "";

  gameData.forEach((item,i)=>{
    grid.innerHTML += `
      <div>
        <input id="w-${i}" placeholder="單字"><br>
        <input type="file" onchange="handleFile(event,${i})"><br>
        <img id="p-${i}" width="60">
      </div>
    `;
  });
}

// ===== 上傳圖片 =====
async function handleFile(e,i){
  const file = e.target.files[0];
  if(!file) return;

  const path = "test/" + Date.now() + "_" + file.name;

  await client.storage.from("images").upload(path,file);

  const { data } = client.storage.from("images").getPublicUrl(path);

  gameData[i].image = data.publicUrl;
  document.getElementById("p-"+i).src = data.publicUrl;
}

// ===== 儲存 =====
async function generateGame(){

  const data = [];

  for(let i=0;i<12;i++){
    data.push({
      word: document.getElementById("w-"+i).value,
      image: document.getElementById("p-"+i).src
    });
  }

  await client.from("rooms").insert({
    user_id: "test",
    room: currentRoom,
    content: data
  });

  alert("成功！");
}

// ===== 新增教室 =====
function addRoom(){
  alert("目前固定 room1");
}

</script>

</body>
</html>
