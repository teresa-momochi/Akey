<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>教材清單</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  background: #f6eef2;
  padding: 30px;
}

h2 {
  margin-bottom: 20px;
}

.list {
  display: grid;
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.actions {
  margin-top: 10px;
}

button {
  margin-right: 10px;
  padding: 6px 12px;
  cursor: pointer;
}
</style>

</head>

<body>

<h2>📚 老師教材清單</h2>

<div class="list" id="list"></div>

<script>

// ✅ Supabase
const client = window.supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E"
)

// 🚀 載入教材
async function loadRooms() {

  const { data, error } = await client
    .from("rooms")
    .select("*")
    .order("created_at", { ascending: false })

  if (error) {
    alert("❌ 讀取失敗")
    return
  }

  const list = document.getElementById("list")
  list.innerHTML = ""

  data.forEach(room => {

    // ⭐ 教材名稱（用第一個單字）
    const title = room.content?.[0]?.word || "未命名教材"

    const div = document.createElement("div")
    div.className = "card"

    div.innerHTML = `
      <div class="title">📘 ${title}</div>
      <div>🆔 ${room.room}</div>
      <div>🕒 ${new Date(room.created_at).toLocaleString()}</div>

      <div class="actions">
        <button onclick="go('${room.room}')">開始遊戲</button>
        <button onclick="copyLink('${room.room}')">複製連結</button>
        <button onclick="deleteRoom(${room.id})">刪除</button>
      </div>
    `

    list.appendChild(div)
  })
}

// 👉 開遊戲
function go(roomId){
  window.location.href = "game.html?room=" + roomId
}

// 👉 複製連結
function copyLink(roomId){
  const link = "https://teresa-momochi.github.io/Akey/game.html?room=" + roomId
  navigator.clipboard.writeText(link)
  alert("已複製！")
}

// 👉 刪除
async function deleteRoom(id){

  if(!confirm("確定刪除？")) return

  const { error } = await client
    .from("rooms")
    .delete()
    .eq("id", id)

  if(error){
    alert("刪除失敗")
  }else{
    alert("已刪除")
    loadRooms()
  }
}

// 啟動
loadRooms()

</script>

</body>
</html>
