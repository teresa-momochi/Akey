<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>Akey Online Teaching Studio</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root {
    --bg-color: #fce4ec;
    --primary: #ff1493;
    --frame-color: #2d1b24;
    --success-color: #2e7d32;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    width: 100vw;
    height: 100vh;
    background-color: var(--bg-color);
    font-family: "Comic Sans MS", cursive;
    display: flex;
    flex-direction: column;
}
header {
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    background: white;
    border-bottom: 2px solid var(--frame-color);
}
h1 { font-size: 20px; color: var(--primary); }

#game-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}
#play-area {
    width: min(90vw, 900px);
    height: min(70vh, 600px);
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
}
.glass-card {
    background: white;
    border: 5px outset var(--frame-color);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
.selected {
    background: #ffe082 !important;
    border: 5px solid orange !important;
}
.word-text {
    font-size: clamp(20px, 4vw, 40px);
    font-weight: bold;
}
.card-img {
    width: 80%;
    height: 80%;
    object-fit: contain;
}
.matched {
    background: #e8f5e9;
    border: 4px solid var(--success-color);
}
.checkmark {
    font-size: clamp(20px, 4vw, 40px);
    display: none;
}
.matched .checkmark { display: block; }
.matched .word-text,
.matched .card-img { display: none; }

#feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 15vh;
    display: none;
}
</style>
</head>

<body>

<header>
    <h1>🌸 Akey Online Teaching Studio 🌸</h1>
</header>

<div id="game-wrapper">
    <div id="play-area"></div>
</div>

<div id="feedback"></div>

<script>

// ✅ Supabase（已幫你填好）
const client = window.supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E"
)

// 👉 讀網址 room
function getRoomId(){
  const params = new URLSearchParams(window.location.search)
  return params.get("room")
}

// 👉 遊戲資料
let words = []
let imageMap = {}

let currentTarget = ""
let currentIndex = 0
let questionList = []

let selectedWord = ""
let selectedImg = ""

let cardMap = { word:{}, img:{} }

// 🚀 載入資料
async function loadGameData(){

  const roomId = getRoomId()

  if(!roomId){
    alert("❌ 沒有 room")
    return
  }

  const { data, error } = await client
    .from("rooms")
    .select("*")
    .eq("room", roomId)
    .single()

  if(error){
    alert("❌ 讀資料失敗")
    console.error(error)
    return
  }

  words = data.content.map(i => i.word)

  data.content.forEach(i=>{
    imageMap[i.word] = i.image
  })

  questionList = [...words].sort(()=>Math.random()-0.5)

  initGame()
}

// 初始化
function initGame(){

  if(currentIndex >= questionList.length){
    alert("完成！")
    location.reload()
    return
  }

  currentTarget = questionList[currentIndex]
  selectedWord = ""
  selectedImg = ""

  if(currentIndex === 0){
    renderGrid()
  }
}

// 畫卡片
function renderGrid(){

  const area = document.getElementById("play-area")
  area.innerHTML = ""

  let items = [
    ...words.map(w=>({type:"word", val:w})),
    ...words.map(w=>({type:"img", val:w}))
  ].sort(()=>Math.random()-0.5)

  items.forEach(item=>{

    const card = document.createElement("div")
    card.className = "glass-card"

    if(item.type === "word"){
      card.innerHTML = `<span class="word-text">${item.val}</span>`
    }else{
      card.innerHTML = `<img src="${imageMap[item.val]}" class="card-img">`
    }

    cardMap[item.type][item.val] = card

    card.onclick = ()=>{
      select(item.type,item.val,card)
    }

    area.appendChild(card)
  })
}

// 點擊
function select(type,val,el){

  if(type === "word"){
    selectedWord = val
  }else{
    selectedImg = val
  }

  if(selectedWord && selectedImg){
    check()
  }
}

// 判斷
function check(){

  if(selectedWord === currentTarget && selectedImg === currentTarget){

    cardMap.word[currentTarget].classList.add("matched")
    cardMap.img[currentTarget].classList.add("matched")

    currentIndex++
    selectedWord = ""
    selectedImg = ""

    setTimeout(initGame,500)

  }else{
    selectedWord = ""
    selectedImg = ""
  }
}

// 啟動
window.onload = loadGameData

</script>

</body>
</html>
