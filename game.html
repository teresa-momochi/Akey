<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>Akey Online Teaching Studio</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    background: #fce4ec;
    font-family: "Comic Sans MS";
}

/* ⭐ 整體格子 */
#play-area {
    display: grid;
    grid-template-columns: repeat(6,1fr);
    gap: 12px;
    padding: 20px;
}

/* ⭐ 卡片（重點修正） */
.glass-card {
    background: white;
    border: 4px solid #333;
    border-radius: 12px;

    width: 100%;
    aspect-ratio: 1 / 1;   /* ⭐ 保持正方形 */

    display: flex;
    justify-content: center;
    align-items: center;

    overflow: hidden;      /* ⭐ 防止圖片跑出去 */
    cursor: pointer;
}

/* ⭐ 配對成功 */
.matched {
    background: #e8f5e9;
}

/* ⭐ 文字 */
.word-text {
    font-size: 22px;
    font-weight: bold;
}

/* ⭐ 圖片（核心修正） */
.card-img {
    max-width: 85%;
    max-height: 85%;
    object-fit: contain;
    pointer-events: none;
}
</style>
</head>

<body>

<h2>🌸 Akey Matching Game 🌸</h2>
<div id="play-area"></div>

<script>

// ✅ Supabase
const client = window.supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E"
)

// 🔊 聲音
const bgMusic = new Audio("bg-music.mp3")
const correctSound = new Audio("hurray.mp3")
const wrongSound = new Audio("right.mp3")

bgMusic.loop = true

// 👉 點一下才播放（瀏覽器規則）
document.body.addEventListener("click", ()=>{
    bgMusic.play()
}, { once:true })

// 👉 讀 room
function getRoomId(){
  const params = new URLSearchParams(window.location.search)
  return params.get("room")
}

let words = []
let imageMap = {}

let selectedWord = ""
let selectedImg = ""

let cardMap = { word:{}, img:{} }

// 🚀 載入資料
async function loadGameData(){

  const roomId = getRoomId()

  const { data } = await client
    .from("rooms")
    .select("*")
    .eq("room", roomId)
    .single()

  words = data.content.map(i=>i.word)

  data.content.forEach(i=>{
    imageMap[i.word] = i.image
  })

  renderGrid()
}

// 🎮 畫面
function renderGrid(){

  const area = document.getElementById("play-area")
  area.innerHTML = ""

  let items = [
    ...words.map(w=>({type:"word", val:w})),
    ...words.map(w=>({type:"img", val:w}))
  ].sort(()=>Math.random()-0.5)

  items.forEach(item=>{

    const card = document.createElement("div")
    card.className = "glass-card"

    if(item.type==="word"){
      card.innerHTML = `<span class="word-text">${item.val}</span>`
    }else{
      card.innerHTML = `<img src="${imageMap[item.val]}" class="card-img">`
    }

    card.onclick = ()=>select(item.type,item.val)

    cardMap[item.type][item.val] = card

    area.appendChild(card)
  })
}

// 🖱 點擊
function select(type,val){

  if(type==="word") selectedWord = val
  else selectedImg = val

  if(selectedWord && selectedImg){
    check()
  }
}

// ✅ 判斷
function check(){

  if(selectedWord === selectedImg){

    correctSound.play()
    confetti()

    cardMap.word[selectedWord].classList.add("matched")
    cardMap.img[selectedImg].classList.add("matched")

  }else{
    wrongSound.play()
  }

  selectedWord = ""
  selectedImg = ""
}

// 啟動
window.onload = loadGameData

</script>

</body>
</html>
