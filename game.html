<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>Akey Online Teaching Studio</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
    background: #fce4ec;
    font-family: "Comic Sans MS";
    text-align: center;
}

/* ⭐ 控制區 */
.controls {
    margin: 10px;
}

.controls button {
    font-size: 20px;
    padding: 8px 16px;
    margin: 5px;
    cursor: pointer;
}

/* ⭐ 格子（改4欄 → 變大） */
#play-area {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 16px;
    padding: 20px;
    max-width: 900px;
    margin: auto;
}

/* ⭐ 卡片 */
.glass-card {
    background: white;
    border: 4px solid #333;
    border-radius: 16px;

    aspect-ratio: 1 / 1;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow: hidden;
    cursor: pointer;
}

/* ⭐ 配對成功 */
.matched {
    background: #e8f5e9;
}

/* ⭐ 文字 */
.word-text {
    font-size: 32px;
    font-weight: bold;
}

/* ⭐ 圖片 */
.card-img {
    max-width: 85%;
    max-height: 85%;
    object-fit: contain;
    pointer-events: none;
}
</style>
</head>

<body>

<h2>🌸 Akey Matching Game 🌸</h2>

<div class="controls">
  <button onclick="speakWord()">🔊 再聽一次</button>
  <button onclick="toggleMusic()">🎵 音樂開關</button>
</div>

<div id="play-area"></div>

<script>

// ✅ Supabase
const client = window.supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E"
)

// 🔊 聲音
const bgMusic = new Audio("bg-music.mp3")
const correctSound = new Audio("hurray.mp3")
const wrongSound = new Audio("right.mp3")

bgMusic.loop = true

// 👉 點一下才播放（瀏覽器限制）
document.body.addEventListener("click", ()=>{
    bgMusic.play()
}, { once:true })

// 👉 讀 room
function getRoomId(){
  const params = new URLSearchParams(window.location.search)
  return params.get("room")
}

let words = []
let imageMap = {}

let selectedWord = ""
let selectedImg = ""

let cardMap = { word:{}, img:{} }

let currentWord = ""

// 🚀 載入資料
async function loadGameData(){

  const roomId = getRoomId()

  const { data } = await client
    .from("rooms")
    .select("*")
    .eq("room", roomId)
    .single()

  words = data.content.map(i=>i.word)

  data.content.forEach(i=>{
    imageMap[i.word] = i.image
  })

  renderGrid()

  // ⭐ 隨機第一題
  currentWord = words[Math.floor(Math.random() * words.length)]
  speakWord()
}

// 🎮 畫面
function renderGrid(){

  const area = document.getElementById("play-area")
  area.innerHTML = ""

  let items = [
    ...words.map(w=>({type:"word", val:w})),
    ...words.map(w=>({type:"img", val:w}))
  ].sort(()=>Math.random()-0.5)

  items.forEach(item=>{

    const card = document.createElement("div")
    card.className = "glass-card"

    if(item.type==="word"){
      card.innerHTML = `<span class="word-text">${item.val}</span>`
    }else{
      card.innerHTML = `<img src="${imageMap[item.val]}" class="card-img">`
    }

    card.onclick = ()=>select(item.type,item.val)

    cardMap[item.type][item.val] = card

    area.appendChild(card)
  })
}

// 🖱 點擊
function select(type,val){

  if(type==="word") selectedWord = val
  else selectedImg = val

  if(selectedWord && selectedImg){
    check()
  }
}

// ✅ 判斷
function check(){

  if(selectedWord === selectedImg){

    correctSound.play()
    confetti()

    cardMap.word[selectedWord].classList.add("matched")
    cardMap.img[selectedImg].classList.add("matched")

    // ⭐ 換下一題
    currentWord = words[Math.floor(Math.random() * words.length)]

    setTimeout(()=>{
      speakWord()
    }, 500)

  }else{
    wrongSound.play()
  }

  selectedWord = ""
  selectedImg = ""
}

// 🔊 唸單字
function speakWord(){

  if(!currentWord) return

  const utter = new SpeechSynthesisUtterance(currentWord)
  utter.lang = "en-US"
  utter.rate = 0.8

  speechSynthesis.cancel()
  speechSynthesis.speak(utter)
}

// 🎵 音樂開關
function toggleMusic(){
  if(bgMusic.paused){
    bgMusic.play()
  }else{
    bgMusic.pause()
  }
}

// 啟動
window.onload = loadGameData

</script>

</body>
</html>
