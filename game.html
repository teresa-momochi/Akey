<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="google" content="notranslate">
<title>Akey Online Teaching Studio</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root {
    --bg-color: #fce4ec;
    --primary: #ff1493;
    --frame-color: #2d1b24;
    --success-color: #2e7d32;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    width: 100vw;
    height: 100vh;
    background-color: var(--bg-color);
    font-family: "Comic Sans MS", cursive;
    display: flex;
    flex-direction: column;
}

header {
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    background: white;
    border-bottom: 2px solid var(--frame-color);
}

h1 {
    font-size: 20px;
    color: var(--primary);
}

#game-wrapper {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

#play-area {
    width: min(90vw, 900px);
    height: min(70vh, 600px);

    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);

    gap: 10px;
}

.glass-card {
    background: white;
    border: 5px outset var(--frame-color);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.selected {
    background: #ffe082 !important;
    border: 5px solid orange !important;
}

.word-text {
    font-size: clamp(20px, 4vw, 40px);
    font-weight: bold;
}

.card-img {
    width: 80%;
    height: 80%;
    object-fit: contain;
}

.matched {
    background: #e8f5e9;
    border: 4px solid var(--success-color);
}

.checkmark {
    font-size: clamp(20px, 4vw, 40px);
    display: none;
}

.matched .checkmark { display: block; }
.matched .word-text,
.matched .card-img { display: none; }

#feedback {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 15vh;
    display: none;
}
</style>
</head>

<body>

<header>
    <h1>🌸 Akey Online Teaching Studio 🌸</h1>
    <div>
        <button onclick="playTargetVoice()">🔊</button>
        <button onclick="toggleMusic()">🎵</button>
    </div>
</header>

<div id="game-wrapper">
    <div id="play-area"></div>
</div>

<div id="feedback"></div>

<audio id="bg-music" src="bg-music.mp3" loop></audio>

<script>

// ✅ Supabase
const client = window.supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E"
)

function getRoomId(){
  const params = new URLSearchParams(window.location.search)
  return params.get("room")
}

// 👉 改成動態
let words = []
let imageMap = {}

let currentTarget = ""
let currentIndex = 0
let questionList = []

let selectedWord = ""
let selectedImg = ""

let cardMap = { word:{}, img:{} }

// 音效
const rightSound = new Audio("right.mp3")
const wrongSound = new Audio("wrong.mp3")
const hurraySound = new Audio("hurray.mp3")

const bgMusic = document.getElementById("bg-music")
bgMusic.volume = 0.2

document.body.addEventListener("click", () => {
    if (bgMusic.paused) bgMusic.play().catch(()=>{})
}, { once:true })

function toggleMusic(){
    bgMusic.paused ? bgMusic.play() : bgMusic.pause()
}

// 🚀 載入資料（唯一新增）
async function loadData(){

    const roomId = getRoomId()

    const { data, error } = await client
        .from("rooms")
        .select("*")
        .eq("room", roomId)
        .single()

    if(error){
        alert("讀資料失敗")
        console.error(error)
        return
    }

    words = data.content.map(i => i.word)

    data.content.forEach(i=>{
        imageMap[i.word] = i.image
    })

    questionList = [...words].sort(()=>Math.random()-0.5)

    initGame()
}

// 初始化（完全沒改）
function initGame(){

    if(currentIndex >= questionList.length){
        hurraySound.play()
        confetti()
        setTimeout(()=>location.reload(),3000)
        return
    }

    currentTarget = questionList[currentIndex]
    selectedWord = ""
    selectedImg = ""

    if(currentIndex === 0){
        renderGrid()
    }

    setTimeout(playTargetVoice,500)
}

// 畫畫面（只改圖片來源）
function renderGrid(){

    const area = document.getElementById("play-area")
    area.innerHTML = ""

    let items = [
        ...words.map(w=>({type:"word", val:w})),
        ...words.map(w=>({type:"img", val:w}))
    ].sort(()=>Math.random()-0.5)

    items.forEach(item=>{

        const card = document.createElement("div")
        card.className = "glass-card"

        if(item.type === "word"){
            card.innerHTML = `
                <span class="word-text">${item.val}</span>
                <span class="checkmark">⭕</span>
            `
        }else{
            card.innerHTML = `
                <img src="${imageMap[item.val]}" class="card-img">
                <span class="checkmark">⭕</span>
            `
        }

        cardMap[item.type][item.val] = card

        card.onclick = ()=>{
            if(!card.classList.contains("matched")){
                select(item.type,item.val,card)
            }
        }

        area.appendChild(card)
    })
}

// 語音
function playTargetVoice(){
    const u = new SpeechSynthesisUtterance(currentTarget)
    u.lang = "en-US"
    u.rate = 0.7
    speechSynthesis.speak(u)
}

// 點擊
function select(type,val,el){

    if(type === "word"){
        document.querySelectorAll(".word-selected")
            .forEach(c=>c.classList.remove("selected","word-selected"))

        selectedWord = val
        el.classList.add("selected","word-selected")

    }else{
        document.querySelectorAll(".img-selected")
            .forEach(c=>c.classList.remove("selected","img-selected"))

        selectedImg = val
        el.classList.add("selected","img-selected")
    }

    if(selectedWord && selectedImg){
        check()
    }
}

// 判斷
function check(){

    const fb = document.getElementById("feedback")

    if(selectedWord === currentTarget && selectedImg === currentTarget){

        document.querySelectorAll(".selected")
            .forEach(c=>c.classList.remove("selected"))

        fb.innerText = "⭕"
        fb.style.display = "block"

        rightSound.play()

        cardMap.word[currentTarget].classList.add("matched")
        cardMap.img[currentTarget].classList.add("matched")

        currentIndex++

        setTimeout(()=>{
            fb.style.display = "none"
            initGame()
        },1000)

    }else{

        fb.innerText = "❌"
        fb.style.display = "block"

        wrongSound.play()

        setTimeout(()=>{
            fb.style.display = "none"
            selectedWord = ""
            selectedImg = ""

            document.querySelectorAll(".selected")
                .forEach(c=>c.classList.remove("selected"))
        },800)
    }
}

// ✅ 啟動改這裡
window.onload = loadData

</script>

</body>
</html>
