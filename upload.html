<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>上傳教材</title>
</head>
<body>

<h1>上傳教材</h1>

<input id="word" placeholder="輸入單字">
<br><br>

<input type="file" id="file">
<br><br>

<button onclick="add()">新增一組</button>
<button onclick="save()">儲存</button>

<h3>目前資料：</h3>
<ul id="list"></ul>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "你的 anon key"
)

let data = []

function add() {
  const word = document.getElementById("word").value
  const file = document.getElementById("file").files[0]

  if (!word || !file) {
    alert("請輸入文字 + 選圖片")
    return
  }

  data.push({ word, file })

  render()

  document.getElementById("word").value = ""
  document.getElementById("file").value = ""
}

function render() {
  const list = document.getElementById("list")
  list.innerHTML = ""

  data.forEach((item, i) => {
    const li = document.createElement("li")
    li.innerText = `${i + 1}. ${item.word}`
    list.appendChild(li)
  })
}

async function save() {
  if (data.length === 0) {
    alert("沒有資料")
    return
  }

  let result = []

  for (let item of data) {
    const fileName = Date.now() + "_" + item.file.name

    const { error } = await supabase.storage
      .from("images")
      .upload(fileName, item.file)

    if (error) {
      alert("圖片上傳失敗")
      return
    }

    const { data: urlData } = supabase.storage
      .from("images")
      .getPublicUrl(fileName)

    result.push({
      word: item.word,
      image: urlData.publicUrl
    })
  }

  const { error } = await supabase
    .from("rooms")
    .insert([
      {
        user_id: "test",
        room: "room1",
        content: result
      }
    ])

  if (error) {
    alert("存資料失敗")
  } else {
    alert("成功！")
    data = []
    render()
  }
}
</script>

</body>
</html>
