<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>老師上傳教材</title>

<style>
body {
  font-family: Arial;
  background: #f6eef2;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

input {
  width: 80%;
  padding: 6px;
  margin-bottom: 10px;
}

img {
  margin-top: 8px;
  max-width: 60px;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>

</head>
<body>

<h2>建立遊戲教材</h2>

<h3 id="progress">已完成：0 / 12</h3>

<div class="grid" id="grid"></div>

<button onclick="save()">儲存教材</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
// ✅ 正確寫法（重點）
const SUPABASE_URL = "https://yrmgvwwmsgbkhijaosyw.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlybWd2d3dtc2dia2hpamFvc3l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3Nzk0ODMsImV4cCI6MjA5MzM1NTQ4M30.EAHpePOJhR7HG6-LmLahZJ00ApCfQYzStvan-M4nh70"

// ⚠️ 注意這行
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

// 建立12格
const grid = document.getElementById("grid")

for (let i = 0; i < 12; i++) {
  grid.innerHTML += `
    <div class="card">
      <input id="word${i}" placeholder="單字" oninput="countFilled()"><br>
      <input type="file" id="file${i}" onchange="preview(this, ${i}); countFilled()"><br>
      <img id="img${i}">
    </div>
  `
}

// 計算完成數
function countFilled() {
  let count = 0

  for (let i = 0; i < 12; i++) {
    const word = document.getElementById("word" + i).value
    const file = document.getElementById("file" + i).files[0]

    if (word && file) count++
  }

  document.getElementById("progress").innerText = `已完成：${count} / 12`
}

// 圖片預覽
function preview(input, i) {
  const file = input.files[0]
  if (!file) return

  const url = URL.createObjectURL(file)
  document.getElementById("img" + i).src = url
}

// 檢查是否填滿
function validate() {
  for (let i = 0; i < 12; i++) {
    const word = document.getElementById("word" + i).value
    const file = document.getElementById("file" + i).files[0]

    if (!word || !file) {
      alert("請填滿12組再儲存")
      return false
    }
  }
  return true
}

// 上傳
async function save() {

  if (!validate()) return

  let result = []

  for (let i = 0; i < 12; i++) {
    const word = document.getElementById("word" + i).value
    const file = document.getElementById("file" + i).files[0]

    const fileName = Date.now() + "_" + file.name

    const { error } = await client.storage
      .from("images")
      .upload(fileName, file)

    if (error) {
      alert("圖片上傳失敗：" + error.message)
      return
    }

    const { data } = client.storage
      .from("images")
      .getPublicUrl(fileName)

    result.push({
      word: word,
      image: data.publicUrl
    })
  }

  const { error } = await client
    .from("rooms")
    .insert([
      {
        user_id: "teacher",
        room: Date.now().toString(),
        content: result
      }
    ])

  if (error) {
    alert("存資料失敗：" + error.message)
  } else {
    alert("✅ 教材建立成功！")
    location.reload()
  }
}
</script>

</body>
</html>
