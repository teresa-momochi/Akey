<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>上傳教材</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>上傳教材</h2>

<input id="word" placeholder="輸入單字">
<br><br>

<input type="file" id="file">
<br><br>

<button onclick="addItem()">新增一組</button>
<button onclick="saveData()">儲存</button>

<script>

const client = supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E"
);

let items = [];

async function addItem(){

  const word = document.getElementById("word").value;
  const file = document.getElementById("file").files[0];

  if(!word || !file){
    alert("請填資料");
    return;
  }

  const fileName = Date.now() + "_" + file.name;

  const { error } = await client.storage
    .from("images")
    .upload(fileName, file);

  if(error){
    alert("上傳失敗");
    console.log(error);
    return;
  }

  const url = "https://yrmgvwwmsgbkhijaosyw.supabase.co/storage/v1/object/public/images/" + fileName;

  items.push({
    word: word,
    image: url
  });

  alert("已加入：" + word);

  document.getElementById("word").value = "";
  document.getElementById("file").value = "";
}

async function saveData(){

  if(items.length === 0){
    alert("沒有資料");
    return;
  }

  const { error } = await client
    .from("rooms")
    .insert([
      {
        user_id: "test",
        room: "room1",
        content: items
      }
    ]);

  if(error){
    alert("存失敗");
    console.log(error);
    return;
  }

  alert("完成！");
  items = [];
}

</script>

</body>
</html>
