<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>建立教材</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  font-family: Arial;
  background: #f6eef2;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 15px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
  border: 3px solid #ccc;
}

.card.ok { border-color: green; }
.card.error { border-color: red; }

input {
  width: 80%;
  margin-bottom: 8px;
}

img {
  max-width: 60px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  font-size: 16px;
}

#resultBox {
  margin-top: 20px;
  background: white;
  padding: 15px;
  display: none;
}
</style>
</head>

<body>

<button onclick="goBack()" style="margin-bottom:10px;">
⬅ 返回教材清單
</button>

<h2>📚 建立教材</h2>

<input id="title" placeholder="輸入教材名稱（例如：CVC short a）" 
style="padding:10px; width:300px; margin-bottom:10px;">

<h3 id="progress">已完成：0 / 12</h3>

<div class="grid" id="grid"></div>

<button onclick="save()">儲存教材</button>

<div id="resultBox">
  <p>✅ 教材建立成功！</p>
  <input id="link" style="width:80%">
  <button onclick="copy()">複製連結</button>
  <br><br>
  <button onclick="goGame()">👉 直接進入遊戲</button>
</div>

<script>

// ⭐ 抓 room（是否為編輯模式）
function getRoomId(){
  const params = new URLSearchParams(window.location.search)
  return params.get("room")
}

// ⭐ 返回
function goBack(){
  window.location.href = "A01-list.html"
}

// Supabase
const client = window.supabase.createClient(
  "https://yrmgvwwmsgbkhijaosyw.supabase.co",
  "sb_publishable_x5SjT9PnauTQohiQr_WF7g_BbQ2-D8E"
)

const grid = document.getElementById("grid")

// 建立12格
for (let i = 0; i < 12; i++) {
  grid.innerHTML += `
    <div class="card" id="card${i}">
      <input id="word${i}" placeholder="單字" oninput="check(${i})"><br>
      <input type="file" id="file${i}" onchange="preview(this,${i});check(${i})"><br>
      <img id="img${i}">
    </div>
  `
}

function preview(input,i){
  const file = input.files[0]
  if(file){
    document.getElementById("img"+i).src = URL.createObjectURL(file)
  }
}

function check(i){
  const word = document.getElementById("word"+i).value.trim()
  const file = document.getElementById("file"+i).files[0]
  const card = document.getElementById("card"+i)

  if(word && (file || document.getElementById("img"+i).src)){
    card.className = "card ok"
  }else{
    card.className = "card error"
  }

  count()
}

function count(){
  let c = 0
  for(let i=0;i<12;i++){
    const w = document.getElementById("word"+i).value.trim()
    const f = document.getElementById("file"+i).files[0]
    const img = document.getElementById("img"+i).src

    if(w && (f || img)) c++
  }
  document.getElementById("progress").innerText = `已完成：${c}/12`
}

let savedRoom = ""

// ⭐⭐ 最終完整版 save（新增 + 修改共用）⭐⭐
async function save(){

  const title = document.getElementById("title").value.trim()
  if(!title){
    alert("請輸入教材名稱")
    return
  }

  const roomId = getRoomId()

  let result = []

  for(let i=0;i<12;i++){
    const word = document.getElementById("word"+i).value.trim()
    const file = document.getElementById("file"+i).files[0]
    const oldImg = document.getElementById("img"+i).src

    if(!word){
      alert("還沒填完")
      return
    }

    let imageUrl = oldImg

    // ⭐ 有換圖片才上傳
    if(file){

      const fileName = Date.now()+"_"+i+"_"+file.name

      const { error } = await client.storage
        .from("images")
        .upload(fileName,file)

      if(error){
        alert("圖片上傳失敗")
        return
      }

      const { data } = client.storage
        .from("images")
        .getPublicUrl(fileName)

      imageUrl = data.publicUrl
    }

    result.push({
      word: word,
      image: imageUrl
    })
  }

  // ⭐ 分支：修改 or 新增
  if(roomId){

    // ===== 修改 =====
    const { error } = await client
      .from("rooms")
      .update({
        title: title,
        content: result
      })
      .eq("room", roomId)

    if(error){
      alert("更新失敗")
    }else{
      alert("已更新教材")
      window.location.href = "A01-list.html"
    }

  }else{

    // ===== 新增 =====
    const newRoom = Date.now().toString()

    const { error } = await client
      .from("rooms")
      .insert([
        {
          user_id:"teacher",
          room: newRoom,
          title: title,
          content: result
        }
      ])

    if(error){
      alert("存資料失敗")
    }else{

      savedRoom = newRoom

      const link = "https://teresa-momochi.github.io/Akey/game.html?room="+newRoom

      document.getElementById("link").value = link
      document.getElementById("resultBox").style.display = "block"
    }
  }
}

// 複製
function copy(){
  const input = document.getElementById("link")
  input.select()
  document.execCommand("copy")
  alert("已複製給學生！")
}

// 進遊戲
function goGame(){
  window.location.href = "game.html?room="+savedRoom
}

// ⭐ 載入舊教材（編輯模式）
window.onload = async function(){

  const roomId = getRoomId()

  if(roomId){

    const { data } = await client
      .from("rooms")
      .select("*")
      .eq("room", roomId)
      .single()

    document.getElementById("title").value = data.title || ""

    data.content.forEach((item,i)=>{
      document.getElementById("word"+i).value = item.word
      document.getElementById("img"+i).src = item.image
      document.getElementById("card"+i).className = "card ok"
    })

    count()
  }
}

</script>

</body>
</html>
