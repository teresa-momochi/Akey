<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G4 Unit 3 居家單字尋寶 - Akey 老師教學版</title>
    <style>
        :root { 
            --primary: #8d6e63; 
            --accent: #e67e22; 
            --grid-bg: #f5f0e6; 
            --bg: #fafafa;
            --found: #2ecc71;
            --control-bg: #fff3e0;
            --info-bg: #e8f4fd;
            --info-border: #3498db;
        }
        
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; color: var(--primary); }
        
        .instruction-panel {
            width: 95%; max-width: 800px; margin-bottom: 20px; padding: 15px 25px;
            background: var(--info-bg); border: 2px dashed var(--info-border);
            border-radius: 15px; color: #2c3e50; font-size: 16px; line-height: 1.6;
            position: relative; z-index: 10;
        }
        .instruction-panel b { color: var(--info-border); }

        #instruction-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .instruction-card { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); max-width: 500px; width: 85%; text-align: center; border: 3px solid var(--primary); }
        .start-btn { background: var(--primary); color: white; border: none; padding: 15px 50px; font-size: 22px; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; }
        
        /* 這裡修改了浮水印：opacity 變淡(0.05)，font-size 加倍(300px) */
        .steel-stamp-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: none; z-index: 9999; opacity: 0.05; transform: rotate(-25deg); }
        .steel-stamp-text { font-size: 300px; font-weight: 900; background: linear-gradient(to right, red, orange, green, blue, purple); -webkit-background-clip: text; color: transparent; text-transform: uppercase; }

        .teacher-control { 
            width: 95%; max-width: 800px; margin-bottom: 30px; padding: 20px; 
            background: var(--control-bg); border: 3px solid var(--accent); 
            border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative; z-index: 10;
        }
        .teacher-control h3 { margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px; font-size: 20px; color: var(--accent); }
        .teacher-control textarea { 
            width: 100%; height: 100px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #ccc; padding: 12px; box-sizing: border-box;
            font-size: 16px; font-family: monospace;
        }
        .update-btn { 
            background: var(--accent); color: white; border: none; padding: 15px 30px; 
            border-radius: 50px; cursor: pointer; font-weight: bold; width: 100%;
            font-size: 20px; box-shadow: 0 4px 0 #d35400; transition: all 0.1s;
        }
        .update-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #d35400; }

        .main-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .game-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 30px; }
        
        #grid { display: grid; grid-template-columns: repeat(12, 42px); gap: 5px; background: var(--grid-bg); padding: 12px; border-radius: 15px; }
        .cell { width: 42px; height: 42px; background: white; display: flex; justify-content: center; align-items: center; font-weight: 700; font-size: 22px; cursor: pointer; border-radius: 8px; transition: 0.2s; border: 1px solid #efebe9; user-select: none; }
        .cell.selected { background: var(--accent); color: white; }
        .cell.found { background: var(--found); color: white; }
        
        .cell.answer-key { background: #ff69b4; color: white; }
        
        @keyframes hint-blink { 0%, 100% { background: white; } 50% { background: #ffeaa7; } }
        .hint-blink { animation: hint-blink 0.8s infinite; }
        
        .panel { background: white; padding: 25px; border-radius: 20px; min-width: 340px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .word-item { display: flex; align-items: center; margin: 12px 0; font-size: 19px; padding: 8px; border-bottom: 1px dashed #eee; justify-content: space-between; }
        .check-box { width: 22px; height: 22px; border: 2px solid var(--primary); border-radius: 4px; margin-right: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .btn-reveal { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--primary); opacity: 0.6; }
        .word-item.completed { color: #bbb; }
        .word-item.completed .check-box { background: var(--found); border-color: var(--found); }
        .word-item.completed .check-box::after { content: '✓'; color: white; font-weight: bold; font-size: 16px; }
        
        h1 { margin: 10px 0; color: var(--primary); }
        .slogan { font-size: 14px; color: #999; margin-bottom: 10px; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop><source src="bg_music.mp3" type="audio/mpeg"></audio>

    <div id="instruction-overlay">
        <div class="instruction-card">
            <h2>🏠 G4 Unit 3 居家單字尋寶</h2>
            <p>A Key to Unlock the Gate for All</p>
            <button class="start-btn" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div class="instruction-panel">
        💡 <b>如何更換單字？</b><br>
        在下方的「老師設定面板」輸入：<b>英文,中文</b>（中間用逗號隔開），每一組單字換一行。<br>
        例如：<br>
        apple,蘋果<br>
        banana,香蕉<br>
        輸入完畢後，點擊下方橘色的 <b>✨更新單字並重新開始</b> 按鈕即可生效！
    </div>

    <div class="steel-stamp-overlay"><div class="steel-stamp-text">Akey</div></div>

    <div class="teacher-control">
        <h3>🛠 老師設定面板</h3>
        <textarea id="customWords">bathroom,浴室
bedroom,臥室
diningroom,餐廳
livingroom,客廳
kitchen,廚房
yard,院子
where,在哪裡</textarea>
        <button class="update-btn" onclick="updateWords()">✨ 更新單字並重新開始</button>
    </div>

    <div class="main-content">
        <div class="game-container">
            <div id="grid"></div>
            <div class="panel">
                <h3 style="margin-top:0">單字清單</h3>
                <div id="word-ui-list"></div>
                <button style="width:100%;margin-top:20px;padding:12px;background:var(--primary);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;" onclick="initGame()">重新打亂網格</button>
            </div>
        </div>
    </div>

    <script>
        let WORD_MAP = [];
        let WORDS = [];
        const SIZE = 12;
        let gridData = [];
        let wordPaths = {};
        let foundWords = new Set();
        let startCell = null;

        function startGame() { 
            document.getElementById('instruction-overlay').style.display = 'none'; 
            const music = document.getElementById('bgMusic');
            music.volume = 0.05; 
            music.play().catch(e => console.log("Music blocked"));
            speak("Let's find the words!");
            updateWords();
        }

        function updateWords() {
            const text = document.getElementById('customWords').value.trim();
            const lines = text.split('\n');
            const newMap = [];
            lines.forEach(line => {
                const parts = line.split(',');
                if(parts.length === 2) newMap.push({ en: parts[0].trim().toLowerCase(), zh: parts[1].trim() });
            });
            if(newMap.length > 0) {
                WORD_MAP = newMap;
                initGame();
            }
        }

        function initGame() {
            WORDS = WORD_MAP.map(item => item.en);
            gridData = Array(SIZE).fill().map(() => Array(SIZE).fill(''));
            wordPaths = {};
            foundWords = new Set();
            startCell = null;
            createGridLogic();
            render();
        }

        function createGridLogic() {
            const dirs = [[0,1],[1,0],[1,1],[0,-1],[-1,0],[-1,-1],[1,-1],[-1,1]];
            [...WORDS].sort((a,b) => b.length - a.length).forEach(word => {
                let placed = false;
                let attempts = 0;
                while(!placed && attempts < 150){
                    const d = dirs[Math.floor(Math.random()*dirs.length)];
                    const r = Math.floor(Math.random()*SIZE), c = Math.floor(Math.random()*SIZE);
                    if(canPlace(word,r,c,d)){
                        let path = [];
                        for(let i=0;i<word.length;i++) {
                            gridData[r+i*d[0]][c+i*d[1]] = word[i];
                            path.push({r: r+i*d[0], c: c+i*d[1]});
                        }
                        wordPaths[word] = path;
                        placed = true;
                    }
                    attempts++;
                }
            });
            for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!gridData[r][c]) gridData[r][c] = String.fromCharCode(97+Math.floor(Math.random()*26));
        }

        function canPlace(w,r,c,d){
            for(let i=0;i<w.length;i++){
                const nr=r+i*d[0], nc=c+i*d[1];
                if(nr<0||nr>=SIZE||nc<0||nc>=SIZE||(gridData[nr][nc]&&gridData[nr][nc]!==w[i])) return false;
            }
            return true;
        }

        function render(){
            const g = document.getElementById('grid'); g.innerHTML = '';
            for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++){
                const div = document.createElement('div'); div.className='cell'; div.textContent=gridData[r][c];
                div.onclick=()=>handleSelect(r,c,div); div.dataset.r=r; div.dataset.c=c;
                g.appendChild(div);
            }
            const l = document.getElementById('word-ui-list'); l.innerHTML = '';
            WORD_MAP.forEach(item => {
                const div = document.createElement('div'); div.className = 'word-item'; div.id = `box-${item.en}`;
                div.innerHTML = `<div class="word-info" onclick="toggleHint('${item.en}')"><div class="check-box"></div><strong>${item.en}</strong> <span style="font-size:14px;margin-left:5px;">(${item.zh})</span></div><button class="btn-reveal" onclick="revealAnswer('${item.en}')">🔍</button>`;
                l.appendChild(div);
            });
        }

        function handleSelect(r, c, el) {
            if (!startCell) {
                startCell = { r, c, el };
                el.classList.add('selected');
            } else {
                const r1 = startCell.r, c1 = startCell.c, dist = Math.max(Math.abs(r - r1), Math.abs(c - c1));
                if (dist > 0) {
                    const sr = r === r1 ? 0 : (r - r1) / dist, sc = c === c1 ? 0 : (c - c1) / dist;
                    let str = "", path = [];
                    for (let i = 0; i <= dist; i++) {
                        const currR = Math.round(r1 + i * sr), currC = Math.round(c1 + i * sc);
                        str += gridData[currR][currC];
                        path.push({ r: currR, c: currC });
                    }
                    if (WORDS.includes(str) && !foundWords.has(str)) {
                        path.forEach(p => {
                            const cell = document.querySelector(`.cell[data-r='${p.r}'][data-c='${p.c}']`);
                            cell.classList.remove('selected', 'answer-key', 'hint-blink');
                            cell.classList.add('found');
                        });
                        markFound(str);
                        speak(str);
                    }
                }
                startCell.el.classList.remove('selected');
                startCell = null;
            }
        }

        function markFound(word) {
            foundWords.add(word);
            document.getElementById(`box-${word}`).classList.add('completed');
            document.querySelectorAll('.cell').forEach(c => c.classList.remove('hint-blink'));
            if(foundWords.size === WORDS.length) setTimeout(() => speak("Excellent!"), 500);
        }

        function toggleHint(word) {
            if (foundWords.has(word)) return;
            const first = word[0];
            document.querySelectorAll('.cell').forEach(c => {
                c.classList.remove('hint-blink');
                if(c.textContent === first && !c.classList.contains('found')) c.classList.add('hint-blink');
            });
            speak(word);
        }

        function revealAnswer(word) {
            if (foundWords.has(word)) return;
            wordPaths[word].forEach(p => document.querySelector(`.cell[data-r='${p.r}'][data-c='${p.c}']`).classList.add('answer-key'));
            markFound(word);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US'; msg.rate = 0.8;
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
